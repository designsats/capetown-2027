// BTC price feed in ZAR
async function fetchBitcoinPrice() {
    try {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=zar');
        const data = await response.json();
        if (!data.bitcoin || !data.bitcoin.zar) {
            throw new Error("Invalid API response");
        }
        const btcPriceZar = parseFloat(data.bitcoin.zar); // BTC price in ZAR
        // Convert BTC price to Sats per ZAR (1 BTC = 100,000,000 sats)
        const satsPerZar = Math.round(100000000 / btcPriceZar);
        document.getElementById('btc-price').innerText = `${satsPerZar.toLocaleString()}`;
        updateSatsValues(satsPerZar);
    } catch (error) {
        console.error('(offline) ', error);
        document.getElementById('btc-price').innerText = 'Error fetching price';
    }
}
function updateSatsValues(satsPerZar) {
    document.querySelectorAll('.ticket-price').forEach(priceElement => {
        const priceText = priceElement.innerText.replace(/[^0-9]/g, ''); // Extract number
        const priceValue = parseInt(priceText, 10) || 0;
        let satsAmount = priceValue * satsPerZar;
        // Round up to nearest 100 sats
        satsAmount = Math.ceil(satsAmount / 100) * 100;
        // Check if a sats element already exists next to this one
        let satsSibling = priceElement.nextElementSibling;
        if (satsSibling && satsSibling.classList.contains('ticket-price-sats')) {
            satsSibling.innerText = `~${satsAmount.toLocaleString()} sats`;
        } else {
            // Create a new sats element below the ticket price
            const satsElement = document.createElement('span');
            satsElement.className = 'ticket-price-sats';
            satsElement.innerText = `~${satsAmount.toLocaleString()} sats`;
            priceElement.parentNode.insertBefore(satsElement, priceElement.nextSibling);
        }
    });
}
fetchBitcoinPrice();  // Fetch immediately
setInterval(fetchBitcoinPrice, 60000);  // Refresh every 60 seconds
// Countdown Timer
window.addEventListener('DOMContentLoaded', (event) => {
const daysEl = document.querySelector('#js-timer-days');
const hoursEl = document.querySelector('#js-timer-hours');
const minutesEl = document.querySelector('#js-timer-minutes');
const secondsEl = document.querySelector('#js-timer-seconds');
if (daysEl && hoursEl && minutesEl && secondsEl) {
// Deadlines are anchored to South African Standard Time (SAST, UTC+2, no DST)
// so the countdown is identical regardless of the visitor's local timezone.
const deadlines = [
  	new Date('2026-07-31T23:59:59+02:00').getTime(),
    new Date('2026-08-31T23:59:59+02:00').getTime(),
    new Date('2026-09-30T23:59:59+02:00').getTime(),
    new Date('2026-10-31T23:59:59+02:00').getTime(),
    new Date('2026-11-30T23:59:59+02:00').getTime(),
    new Date('2026-12-31T23:59:59+02:00').getTime(),
    new Date('2027-01-31T23:59:59+02:00').getTime(),
    new Date('2027-02-27T23:59:59+02:00').getTime()
];
function getNextDeadline() {
    const now = new Date().getTime();
    return deadlines.find(date => date > now) || null;
}
let currentDeadline = getNextDeadline();
if (currentDeadline) {
    const timerInterval = setInterval(() => {
        const now = new Date().getTime();
        const distance = currentDeadline - now;
        if (distance <= 0) {
            clearInterval(timerInterval);
            currentDeadline = getNextDeadline();
            if (currentDeadline) {
                startCountdown();
            } else {
                daysEl.innerText = '00';
                hoursEl.innerText = '00';
                minutesEl.innerText = '00';
                secondsEl.innerText = '00';
            }
        } else {
            const days = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
            daysEl.innerText = days;
            hoursEl.innerText = hours;
            minutesEl.innerText = minutes;
            secondsEl.innerText = seconds;
        }
    }, 1000);
}
}
